name: CI

# Runs on every PR into staging or main, and on pushes to those branches
# (Render handles the actual deploy via its own branch-based auto-deploy —
# this workflow's job is just to catch broken builds before they get there).
on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

jobs:
  backend:
    name: Backend — install & compile check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py app/config.py app/database.py app/schemas.py app/routes/notes.py

  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run build
